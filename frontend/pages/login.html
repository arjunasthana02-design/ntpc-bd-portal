<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NTPC BD Portal</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="login-page">
    <main class="auth-shell">
        <section class="login-card auth-card">
            <h1>NTPC BD Portal</h1>
            <p class="login-subtitle">Admin controlled employee reporting and review system</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" type="button">Login</button>
                <button class="auth-tab" id="registerTab" type="button">Employee Register</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required />
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required />
                </div>
                <label class="show-password-row">
                    <input type="checkbox" id="showLoginPassword" />
                    Show Password
                </label>
                <button class="login-btn" type="submit">Login</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label for="fullName">Full name</label>
                    <input type="text" id="fullName" placeholder="Employee full name" required />
                </div>
                <div class="input-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" placeholder="Choose username" required />
                </div>
                <div class="input-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Choose password" required />
                </div>
                <button class="login-btn" type="submit">Submit for Admin Approval</button>
            </form>

            <p id="message" class="message"></p>
        </section>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
