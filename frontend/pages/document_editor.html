<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NTPC BD Portal - Document Editor</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand-box">
                    <div class="brand-logo">N</div>
                    <div>
                        <h2>NTPC BD Portal</h2>
                        <p>Document Workspace</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">D</span><span>Dashboard</span></a>
                <a href="upload.html" class="nav-item"><span class="nav-icon">U</span><span>Submit Data</span></a>
                <a href="raw_documents.html" class="nav-item"><span class="nav-icon">R</span><span>Raw Data</span></a>
                <a href="weekly_reports.html" class="nav-item"><span class="nav-icon">W</span><span>Weekly Reports</span></a>
                <a href="monthly_reports.html" class="nav-item"><span class="nav-icon">M</span><span>Monthly Reports</span></a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="localStorage.removeItem('ntpcUser'); window.location.href='login.html';">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Document Editor</h1>
                    <p>Create source documents, generate weekly/monthly drafts, and export finished files.</p>
                </div>
                <div class="topbar-right">
                    <span id="saveStatus" class="live-tag">Ready</span>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="left-panel">
                    <section class="panel-card">
                        <div class="panel-header">
                            <h3>Documents</h3>
                            <button class="mini-btn" id="newDocumentBtn" type="button">New</button>
                        </div>
                        <input
                            type="search"
                            placeholder="Search documents"
                            oninput="filterDocuments(this.value)"
                            style="width:100%; margin-bottom:14px;"
                        />
                        <div id="documentList" class="document-list"></div>
                    </section>
                </div>

                <div class="right-panel">
                    <section class="panel-card">
                        <div class="panel-header">
                            <h3>Document Details</h3>
                            <div class="report-action-group">
                                <button class="mini-btn" id="saveDocument" type="button">Save</button>
                                <button class="mini-btn" id="generateAI" type="button">Generate AI</button>
                                <button class="mini-btn" id="generateWeekly" type="button">Weekly</button>
                                <button class="mini-btn" id="generateMonthly" type="button">Monthly</button>
                                <button class="mini-btn" type="button" onclick="exportPDF()">PDF</button>
                                <button class="mini-btn" type="button" onclick="exportDOCX()">Word</button>
                            </div>
                        </div>

                        <div class="report-source-grid">
                            <label>
                                Title
                                <input id="docTitle" type="text" placeholder="Document title" />
                            </label>
                            <label>
                                Company
                                <select id="docCompany"></select>
                            </label>
                            <label>
                                Project
                                <input id="docProject" type="text" placeholder="Project name" />
                            </label>
                            <label>
                                Type
                                <select id="docType">
                                    <option value="RAW">Raw</option>
                                    <option value="WEEKLY">Weekly</option>
                                    <option value="MONTHLY">Monthly</option>
                                    <option value="REPORT">Report</option>
                                </select>
                            </label>
                            <label>
                                Period Start
                                <input id="docStartDate" type="datetime-local" />
                            </label>
                            <label>
                                Period End
                                <input id="docEndDate" type="datetime-local" />
                            </label>
                        </div>
                    </section>

                    <section class="panel-card">
                        <div id="toolbar">
                            <span class="ql-formats">
                                <select class="ql-header">
                                    <option selected></option>
                                    <option value="1"></option>
                                    <option value="2"></option>
                                </select>
                                <select class="ql-font"></select>
                            </span>
                            <span class="ql-formats">
                                <button class="ql-bold"></button>
                                <button class="ql-italic"></button>
                                <button class="ql-underline"></button>
                                <button class="ql-strike"></button>
                            </span>
                            <span class="ql-formats">
                                <select class="ql-color"></select>
                                <select class="ql-background"></select>
                            </span>
                            <span class="ql-formats">
                                <button class="ql-list" value="ordered"></button>
                                <button class="ql-list" value="bullet"></button>
                                <button class="ql-align" value=""></button>
                                <button class="ql-align" value="center"></button>
                                <button class="ql-align" value="right"></button>
                            </span>
                            <span class="ql-formats">
                                <button class="ql-link"></button>
                                <button class="ql-clean"></button>
                            </span>
                        </div>
                        <div id="editor" style="min-height:620px; background:white;"></div>
                    </section>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/document_editor.js"></script>
</body>
</html>
